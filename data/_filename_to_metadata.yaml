# Curated map: PDF filename → chunk metadata.
#
# Consumed by:
#   scripts/seed_chunks.py        — at ingestion of new PDFs
#   scripts/backfill_chunk_metadata.py — to retro-tag the existing corpus
#
# Each entry can specify:
#   cancer_types  list — defaults to ['general'] if missing
#   doc_type      one of: clinician_guideline, patient_guideline,
#                 survivorship, screening, supportive, reference
#   audience      one of: patient, clinician
#   guideline_org one of: NCCN, ASCO, ACS, NCI, CDC, UOAA, other
#
# If a filename isn't listed here, the seeding/backfill scripts assume
# cancer_types=['general'] and leave doc_type/audience/guideline_org NULL.

ACS_Caregiver_Support.pdf:
  cancer_types: [general]
  doc_type: supportive
  audience: patient
  guideline_org: ACS

