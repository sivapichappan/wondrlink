phases:
  early_chemo:    { min_days: 0,    max_days: 28 }
  mid_chemo:      { min_days: 28,   max_days: 180 }
  late_chemo:     { min_days: 180,  max_days: null }
  post_surgery:   {}
  hormone_therapy: {}
  immunotherapy:  {}
  post_radiation: {}
  fertility_sparing: {}
  surveillance:   {}
  newly_diagnosed: {}
  metastatic_recurrent: {}
  general:        {}

suggestions:
  early_chemo:
    - "What side effects from cycle 1 of {regimen} should I watch for?"
    - "What helps with neuropathy from paclitaxel?"
    - "Help me prepare for my next visit"
  mid_chemo:
    - "How will we know if the treatment is working?"
    - "What can I do about chemo-related fatigue and nausea?"
    - "Help me prepare for my next visit"
  late_chemo:
    - "What does life after chemo look like?"
    - "When will we restage / decide next steps?"
    - "Help me prepare for my next visit"
  post_surgery:
    - "What does recovery from hysterectomy + BSO involve?"
    - "What if my pathology shows higher-risk features than expected?"
    - "Help me prepare for my next visit"
  hormone_therapy:
    - "How long will I stay on progestin therapy?"
    - "What side effects from progestins should I expect?"
    - "Help me prepare for my next visit"
  immunotherapy:
    - "What immune-related side effects should I watch for on pembrolizumab / dostarlimab?"
    - "How will we tell if immunotherapy is working?"
    - "Help me prepare for my next visit"
  post_radiation:
    - "What does recovery from vaginal brachytherapy look like?"
    - "What about vaginal stenosis and sexual health after radiation?"
    - "Help me prepare for my next visit"
  fertility_sparing:
    - "How long can I stay on progestin therapy before I need a hysterectomy?"
    - "When can we try to get pregnant?"
    - "Help me prepare for my next visit"
  surveillance:
    - "When is my next survivorship visit due?"
    - "What signs of recurrence should I watch for?"
    - "Help me prepare for my next visit"
  newly_diagnosed:
    - "Walk me through what stage {stage} means for my care"
    - "What does my molecular class (POLE / MSI / NSMP / p53-abnormal) mean for treatment?"
    - "Should I be tested for Lynch syndrome?"
  metastatic_recurrent:
    - "What does my current regimen aim to do — control disease, shrink it, or both?"
    - "How will we know when it might be time to change treatment?"
    - "What palliative care options support me alongside active treatment?"
  general:
    - "What questions should I ask my oncology team?"
    - "How can I prepare for my next appointment?"
    - "Help me prepare for my next visit"

descriptors:
  active_treatment: "You're {days_clause}{regimen}{cycle_clause}."
  hormone_therapy: "On hormone-based therapy."
  immunotherapy:   "On immunotherapy — long-tail benefit possible but immune-related side effects matter."
  fertility_sparing: "On fertility-sparing therapy with serial endometrial sampling."
  post_surgery:    "{days} days post-surgery — recovery phase."
  surveillance:    "{days} days post-treatment — surveillance phase."
  surveillance_no_date: "You're in the surveillance phase."
  metastatic_recurrent: "Metastatic or recurrent disease — focus is on disease control and quality of life."
  newly_diagnosed: "Newly diagnosed — {stage_clause}{cancer_name}."
  fallback:        "Welcome back."
