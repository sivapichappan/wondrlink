# Per-cancer advocacy orgs, helplines, and topic-specific resources for uterine (endometrial) cancer.

advocacy:
  - name: Foundation for Women's Cancer (FWC) / SGO Patient Resources
    url: https://www.foundationforwomenscancer.org
    desc: SGO-affiliated patient education + survivor community for endometrial, ovarian, and other gynecologic cancers
  - name: Endometrial Cancer Action Network for African Americans (ECANA)
    url: https://ecanawomen.org
    desc: Dedicated advocacy + education for Black women — health-disparities focus
  - name: SHARE — Uterine Cancer
    url: https://www.sharecancersupport.org/uterine-endometrial-cancer/
    desc: Peer support + helpline for uterine cancer
  - name: American Cancer Society — Endometrial Cancer
    url: https://www.cancer.org/cancer/types/endometrial-cancer.html
    desc: General overview, treatment, survivorship

helplines:
  - name: FWC Helpline
    url: https://www.foundationforwomenscancer.org/get-help/
    desc: Gyn-onc-specific navigation
  - name: ECANA
    url: https://ecanawomen.org/contact/
    desc: Resources for Black women with endometrial cancer
  - name: American Cancer Society
    number: 1-800-227-2345
    tel: tel:18002272345
    desc: 24/7 general cancer information and support
  - name: NCI Cancer Information Service
    number: 1-800-422-6237
    tel: tel:18004226237
    desc: Treatment information, clinical trials, expert support

hereditary_lynch:
  - name: Lynch Syndrome International
    url: https://lynchcancers.com
    desc: Lynch syndrome patient education + family-screening guidance
  - name: AliveAndKickn
    url: https://aliveandkickn.org
    desc: Lynch syndrome advocacy
  - name: NCCN Genetic / Familial High-Risk Assessment — Colorectal/Endometrial
    url: https://www.nccn.org/patients/
    desc: When genetic testing is appropriate
  - name: NSGC Find a Genetic Counselor
    url: https://www.findageneticcounselor.com
    desc: Locate a certified counselor

molecular_classification:
  - name: NCCN Guidelines for Patients — Uterine Cancer
    url: https://www.nccn.org/patients/guidelines/content/PDF/uterine-patient.pdf
    desc: Plain-language overview including molecular classification
  - name: NCI PDQ Endometrial Cancer Treatment
    url: https://www.cancer.gov/types/uterine/patient/endometrial-treatment-pdq
    desc: NCI patient-facing treatment overview

fertility_sparing:
  - name: Alliance for Fertility Preservation
    url: https://www.allianceforfertilitypreservation.org
    desc: Pre-treatment fertility options
  - name: Livestrong Fertility
    url: https://www.livestrong.org/we-can-help/livestrong-fertility
    desc: Fertility preservation financial + clinical navigation

side_effects:
  - name: NCCN Distress Management (patient)
    url: https://www.nccn.org/patients/guidelines/content/PDF/distress-patient.pdf
    desc: Anxiety, sleep, mood — cross-cutting
  - name: Cancer.Net — Endometrial Cancer Survivorship
    url: https://www.cancer.net/cancer-types/uterine-cancer/survivorship
    desc: Survivorship resources
  - name: NCCN — Sexual Health After Cancer (patient)
    url: https://www.nccn.org/patients/
    desc: Vaginal stenosis, dryness, intimacy after gynecologic cancer treatment

palliative_supportive:
  - name: Get Palliative Care
    url: https://getpalliativecare.org
    desc: Find palliative care providers
  - name: CaringInfo (NHPCO)
    url: https://www.caringinfo.org
    desc: Advance care planning + hospice information

caregiver:
  - name: ACS Caregiver Resource Guide
    url: https://www.cancer.org/cancer/caregivers.html
    desc: Practical guidance for supporting someone with endometrial cancer
