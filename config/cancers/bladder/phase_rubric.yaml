# Phase classification + per-phase suggested questions for bladder cancer.
# Reflects the NMIBC vs MIBC split and the dominance of intravesical therapy
# in early-stage care.

phases:
  intravesical_induction: { min_days: 0,   max_days: 56 }
  intravesical_maintenance: { min_days: 56, max_days: null }
  early_chemo:    { min_days: 0,   max_days: 28 }
  mid_chemo:      { min_days: 28,  max_days: 180 }
  late_chemo:     { min_days: 180, max_days: null }
  post_cystectomy: {}
  immunotherapy:  {}
  surveillance:   {}
  newly_diagnosed: {}
  metastatic:     {}
  general:        {}

suggestions:
  intravesical_induction:
    - "What side effects from BCG (or intravesical chemo) should I watch for?"
    - "How will we know if the intravesical treatment is working?"
    - "Help me prepare for my next visit"
  intravesical_maintenance:
    - "How long will I need maintenance BCG / intravesical therapy?"
    - "What if my urinary symptoms get worse between treatments?"
    - "Help me prepare for my next visit"
  early_chemo:
    - "What side effects from cycle 1 of {regimen} should I watch for?"
    - "When does fatigue typically peak on this regimen?"
    - "Help me prepare for my next visit"
  mid_chemo:
    - "How will we know if my treatment is working?"
    - "What can I do about chemo-related fatigue and nausea?"
    - "Help me prepare for my next visit"
  late_chemo:
    - "What does life after chemo typically look like for bladder cancer?"
    - "When will we restage / decide next steps?"
    - "Help me prepare for my next visit"
  post_cystectomy:
    - "What does living with a urinary diversion involve day to day?"
    - "How long does recovery from cystectomy typically take?"
    - "Help me prepare for my next visit"
  immunotherapy:
    - "What immune-related side effects should I watch for?"
    - "How will we tell if immunotherapy is working?"
    - "Help me prepare for my next visit"
  surveillance:
    - "When is my next cystoscopy due?"
    - "What signs of recurrence should I watch for?"
    - "Help me prepare for my next visit"
  newly_diagnosed:
    - "Walk me through what stage {stage} means for my care"
    - "What's the difference between non-muscle-invasive and muscle-invasive disease?"
    - "Should I get a second opinion before starting treatment?"
  metastatic:
    - "What does my current regimen aim to do — control disease, shrink it, or both?"
    - "How will we know when it might be time to change treatment?"
    - "What palliative care options can support me alongside active treatment?"
  general:
    - "What questions should I ask my oncology team?"
    - "How can I prepare for my next appointment?"
    - "Help me prepare for my next visit"

descriptors:
  active_treatment: "You're {days_clause}{regimen}{cycle_clause}."
  intravesical_induction: "On intravesical induction therapy."
  intravesical_maintenance: "On maintenance intravesical therapy."
  surveillance:    "{days} days post-treatment — surveillance phase."
  surveillance_no_date: "You're in the surveillance phase."
  post_cystectomy: "{days} days post-cystectomy — recovery phase."
  immunotherapy:   "On immunotherapy — long-tail benefit possible but immune-related side effects matter."
  metastatic:      "Metastatic urothelial cancer — focus is on disease control and quality of life."
  newly_diagnosed: "Newly diagnosed — {stage_clause}{cancer_name}."
  fallback:        "Welcome back."
