# Phase classification + per-phase suggested questions for kidney cancer.

phases:
  active_surveillance: {}
  post_surgery:    {}
  adjuvant_therapy: {}
  targeted_therapy: {}
  immunotherapy:   {}
  surveillance:    {}
  newly_diagnosed: {}
  metastatic:      {}
  general:         {}

suggestions:
  active_surveillance:
    - "How often will the mass be imaged on active surveillance?"
    - "What signs would tell us it's time to intervene?"
    - "Help me prepare for my next visit"
  post_surgery:
    - "What does recovery from partial / radical nephrectomy look like?"
    - "What will my kidney function look like after surgery?"
    - "Help me prepare for my next visit"
  adjuvant_therapy:
    - "Why are we doing adjuvant pembrolizumab if surgery removed the cancer?"
    - "How long does adjuvant immunotherapy typically last?"
    - "Help me prepare for my next visit"
  targeted_therapy:
    - "What side effects from my TKI should I watch for at home?"
    - "How will we know if the treatment is working?"
    - "Help me prepare for my next visit"
  immunotherapy:
    - "What immune-related side effects should I watch for?"
    - "How will we tell if immunotherapy is working?"
    - "Help me prepare for my next visit"
  surveillance:
    - "When is my next surveillance imaging due?"
    - "What signs of recurrence should I watch for?"
    - "Help me prepare for my next visit"
  newly_diagnosed:
    - "Walk me through what stage {stage} means for my care"
    - "What does my histology (clear cell, papillary, chromophobe) mean for treatment?"
    - "Should I be tested for hereditary kidney cancer syndromes?"
  metastatic:
    - "What does my current regimen aim to do — control disease, shrink it, or both?"
    - "How will we know when it might be time to change treatment?"
    - "What palliative care options can support me alongside active treatment?"
  general:
    - "What questions should I ask my oncology team?"
    - "How can I prepare for my next appointment?"
    - "Help me prepare for my next visit"

descriptors:
  active_treatment: "You're {days_clause}{regimen}{cycle_clause}."
  active_surveillance: "On active surveillance for a small renal mass."
  surveillance:    "{days} days post-surgery — surveillance phase."
  surveillance_no_date: "You're in the surveillance phase."
  targeted_therapy: "On VEGF-targeted therapy."
  immunotherapy:   "On immunotherapy — long-tail benefit possible but immune-related side effects matter."
  adjuvant_therapy: "On adjuvant therapy to reduce recurrence risk."
  post_surgery:    "{days} days post-nephrectomy — recovery phase."
  metastatic:      "Metastatic kidney cancer — focus is on disease control and quality of life."
  newly_diagnosed: "Newly diagnosed — {stage_clause}{cancer_name}."
  fallback:        "Welcome back."
