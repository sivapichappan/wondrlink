# Phase classification + per-phase suggested questions for lung cancer.
# Distinct from breast/prostate because lung-cancer journeys often pivot
# rapidly between treatment lines on biomarker results and have a strong
# split between curative-intent and metastatic care from day one.

phases:
  early_chemo:    { min_days: 0,    max_days: 28 }
  mid_chemo:      { min_days: 28,   max_days: 180 }
  late_chemo:     { min_days: 180,  max_days: null }
  targeted_therapy: {}
  immunotherapy:  {}
  post_surgery:   {}
  post_radiation: {}
  surveillance:   {}
  newly_diagnosed: {}
  metastatic:     {}
  general:        {}

suggestions:
  early_chemo:
    - "What side effects from cycle 1 of {regimen} should I watch for?"
    - "When does fatigue typically peak on this regimen?"
    - "Help me prepare for my next visit"
  mid_chemo:
    - "How will we know if my treatment is working?"
    - "What can I do about chemo-related fatigue and nausea?"
    - "Help me prepare for my next visit"
  late_chemo:
    - "What does life after chemo typically look like for lung cancer?"
    - "When will we restage / decide next steps?"
    - "Help me prepare for my next visit"
  targeted_therapy:
    - "What side effects from my TKI should I watch for at home?"
    - "What happens if my cancer becomes resistant to this drug?"
    - "Help me prepare for my next visit"
  immunotherapy:
    - "What immune-related side effects matter most — skin, gut, thyroid, lung?"
    - "How will we tell if immunotherapy is working?"
    - "Help me prepare for my next visit"
  post_surgery:
    - "What does recovery from lobectomy / VATS typically look like?"
    - "When can I expect to return to normal breathing capacity?"
    - "Help me prepare for my next visit"
  post_radiation:
    - "What does radiation pneumonitis feel like and when does it usually appear?"
    - "How long do radiation side effects typically last?"
    - "Help me prepare for my next visit"
  surveillance:
    - "When is my next surveillance CT due?"
    - "What signs of recurrence should I watch for?"
    - "Help me prepare for my next visit"
  newly_diagnosed:
    - "Walk me through what stage {stage} means for my care options"
    - "What does my biomarker testing (EGFR, ALK, PD-L1) mean for treatment?"
    - "Should I get a second opinion before starting treatment?"
  metastatic:
    - "What does my current regimen aim to do — control disease, shrink it, or both?"
    - "What palliative care options can support me alongside active treatment?"
    - "How will we know when it might be time to change treatment?"
  general:
    - "What questions should I ask my oncology team?"
    - "How can I prepare for my next appointment?"
    - "Help me prepare for my next visit"

descriptors:
  active_treatment: "You're {days_clause}{regimen}{cycle_clause}."
  surveillance:     "{days} days post-treatment — surveillance phase."
  surveillance_no_date: "You're in the surveillance phase."
  targeted_therapy: "On targeted therapy for an oncogene-driven lung cancer."
  immunotherapy:    "On immunotherapy — long-tail benefit possible but immune-related side effects matter."
  post_surgery:     "{days} days post-surgery — recovery phase."
  metastatic:       "Metastatic lung cancer — focus is on disease control and quality of life."
  newly_diagnosed:  "Newly diagnosed — {stage_clause}{cancer_name}."
  fallback:         "Welcome back."
