# Per-cancer advocacy orgs, helplines, and topic-specific resources for lung cancer.
# Surfaced by lib/llm_utils.py get_relevant_resources when patient cancer_slug == 'lung'.

advocacy:
  - name: American Lung Association
    url: https://www.lung.org
    desc: Patient advocacy, education, smoking cessation, LungPower community
  - name: GO2 for Lung Cancer
    url: https://go2.org
    desc: Patient + caregiver navigation, treatment-decision tools, helpline
  - name: LUNGevity Foundation
    url: https://www.lungevity.org
    desc: Research funding, patient education, biomarker testing advocacy
  - name: Lung Cancer Research Foundation (LCRF)
    url: https://www.lungcancerresearchfoundation.org
    desc: Research funding + patient education
  - name: ALK Positive
    url: https://www.alkpositive.org
    desc: Patient community focused on ALK-rearranged NSCLC
  - name: EGFR Resisters
    url: https://www.egfrcancer.org
    desc: Patient community for EGFR-mutant lung cancer

helplines:
  - name: GO2 HelpLine
    number: 1-800-298-2436
    tel: tel:18002982436
    desc: Lung cancer navigation, treatment questions, support
  - name: American Cancer Society
    number: 1-800-227-2345
    tel: tel:18002272345
    desc: 24/7 general cancer information and support
  - name: NCI Cancer Information Service
    number: 1-800-422-6237
    tel: tel:18004226237
    desc: Treatment information, clinical trials, expert support

screening:
  - name: ACS Lung Cancer Screening Guidelines
    url: https://www.cancer.org/cancer/types/lung-cancer/detection-diagnosis-staging/early-detection-recommendations.html
    desc: Annual low-dose CT for high-risk current and former smokers
  - name: USPSTF Lung Cancer Screening
    url: https://www.uspreventiveservicestaskforce.org/uspstf/recommendation/lung-cancer-screening
    desc: Updated 2021 — annual LDCT, ages 50–80, 20+ pack-year history
  - name: SaveYourBreath.org (GO2)
    url: https://go2.org/saveyourbreath/
    desc: Screening eligibility checker + finder

smoking_cessation:
  - name: SmokeFree.gov
    url: https://smokefree.gov
    desc: Free quit-coaching, texts, and apps
  - name: 1-800-QUIT-NOW
    number: 1-800-784-8669
    tel: tel:18007848669
    desc: State quitline — free counseling and (often) free NRT
  - name: ACS Stay Away from Tobacco
    url: https://www.cancer.org/healthy/stay-away-from-tobacco.html
    desc: Cessation tools and support

biomarker_testing:
  - name: LUNGevity Biomarker Testing
    url: https://www.lungevity.org/for-patients-caregivers/navigating-your-diagnosis/biomarker-testing
    desc: Why comprehensive biomarker testing matters before starting treatment
  - name: NCCN Biomarker Compendium (Patient)
    url: https://www.nccn.org/patients/
    desc: Plain-language explanations of EGFR, ALK, ROS1, KRAS, PD-L1

side_effects:
  - name: NCCN Distress Management (patient)
    url: https://www.nccn.org/patients/guidelines/content/PDF/distress-patient.pdf
    desc: Anxiety, sleep, mood — cross-cutting
  - name: ASCO Survivorship Care (Cancer.Net)
    url: https://www.cancer.net/survivorship
    desc: Survivorship resources
  - name: American Lung Association — Living with Lung Cancer
    url: https://www.lung.org/lung-health-diseases/lung-disease-lookup/lung-cancer/patients
    desc: Symptom management, oxygen, breathlessness

palliative_supportive:
  - name: Get Palliative Care
    url: https://getpalliativecare.org
    desc: Find palliative care providers — early integration is associated with better outcomes in lung cancer
  - name: CaringInfo (NHPCO)
    url: https://www.caringinfo.org
    desc: Advance care planning + hospice information

caregiver:
  - name: ACS Caregiver Resource Guide
    url: https://www.cancer.org/cancer/caregivers.html
    desc: Practical guidance for supporting someone with lung cancer
  - name: Family Caregiver Alliance
    url: https://www.caregiver.org
    desc: Education + state-by-state support locator
