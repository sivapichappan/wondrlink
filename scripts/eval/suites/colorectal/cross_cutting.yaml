# Cross-cutting prompts — universal in cancer care. Tier 1 must accept
# them, and Tier 2 should route to the general corpus (not refuse them
# as "not about colon").

prompts:
  - id: cc_chemo_brain
    query: "I've been forgetting things since chemo started. Is this 'chemo brain'?"
    expect:
      should_reject: false
      route: selected

  - id: cc_fatigue_management
    query: "How do I manage the fatigue from treatment?"
    expect:
      should_reject: false

  - id: cc_financial_stress
    query: "Treatment is bankrupting me. What financial support exists?"
    expect:
      should_reject: false

  - id: cc_fertility
    query: "Can I still have kids after cancer treatment?"
    expect:
      should_reject: false

  - id: cc_caregiver_burnout
    query: "I'm caring for my partner and I'm exhausted. What do I do?"
    expect:
      should_reject: false

  - id: cc_distress_screening
    query: "I've been feeling sad and hopeless for weeks. Is this normal?"
    expect:
      should_reject: false
